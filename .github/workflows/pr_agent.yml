name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' && (github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/'))) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    name: Run pr agent on every pull request
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@8e4d32e # v0.39.0
        env:
          OPENAI__KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI__API_BASE: "https://api.siliconflow.cn/v1"
          CONFIG__MODEL: "Qwen/Qwen2.5-7B-Instruct"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

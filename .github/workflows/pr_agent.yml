name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    name: Run pr agent on every pull request
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961
        env:
          OPENAI_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI_API_BASE: "https://api.siliconflow.com/v1"
          CONFIG__MODEL: "openai/Qwen/Qwen3-8B"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "65536"
          CONFIG__PR_ACTIONS: '["opened", "reopened", "ready_for_review", "synchronize"]'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate PR Agent output
        if: always() && steps.pragent.outputs.review != ''
        run: |
          echo "Validating PR Agent output..."
          echo '${{ steps.pragent.outputs.review }}' | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print('JSON output is valid')
          except Exception as e:
              print(f'Validation failed: {e}')
              sys.exit(1)
          "

